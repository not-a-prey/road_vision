# Save messages to disk so they survive a restart
persistence true
persistence_location /mosquitto/data/

# Allow connections from other Docker containers (IMPORTANT)
listener 1883 0.0.0.0

## Authentication ##
# Set to true for development; change to false + password_file for production
allow_anonymous true

## Log ##
# Logs to both the file and the Docker console (stdout)
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout